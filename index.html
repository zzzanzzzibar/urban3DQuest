<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
  <title>Urban3DQuest</title>
  <meta name="theme-color" content="#0f172a">
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:system-ui,sans-serif;background:#0f172a;color:#e2e8f0;min-height:100vh;overflow:hidden}
    /* ── Background map (landing) ── */
    #bgMap{position:fixed;inset:0;z-index:0}
    /* ── Pseudo screen ── */
    #pseudoScreen{position:fixed;inset:0;background:linear-gradient(180deg,rgba(15,23,42,.55) 0%,rgba(15,23,42,.75) 100%);z-index:500;display:flex;align-items:center;justify-content:center;padding:24px}
    .ps-box{width:100%;max-width:360px;text-align:center;background:rgba(15,23,42,.82);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid rgba(148,163,184,.18);border-radius:24px;padding:32px 28px;box-shadow:0 8px 48px rgba(0,0,0,.6)}
    .ps-logo{font-size:2.8rem;margin-bottom:8px}
    .ps-title{font-size:1.5rem;font-weight:800;letter-spacing:-.02em;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px}
    .ps-sub{font-size:0.82rem;color:#94a3b8;margin-bottom:28px;line-height:1.5}
    .ps-box input{width:100%;padding:14px;background:rgba(30,41,59,.9);border:2px solid #334155;border-radius:12px;color:#f1f5f9;font-size:1.1rem;text-align:center;margin-bottom:12px;letter-spacing:.05em}
    .ps-box input:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.2)}
    .btn-main{width:100%;padding:16px;border:none;border-radius:12px;background:linear-gradient(135deg,#3b82f6,#6366f1);color:#fff;font-size:1.05rem;font-weight:700;cursor:pointer;box-shadow:0 4px 20px rgba(99,102,241,.4);transition:opacity .2s}
    .btn-main:disabled{opacity:.5;cursor:default}
    /* ── Header ── */
    header{background:#1e293b;padding:10px 16px;display:flex;align-items:center;gap:10px;border-bottom:1px solid #334155}
    header h1{font-size:0.88rem;flex:1;color:#94a3b8}
    .pseudo-chip{background:#172554;color:#93c5fd;padding:4px 10px;border-radius:20px;font-size:0.78rem;font-weight:600}
    .score-chip{background:#052e16;color:#4ade80;padding:4px 10px;border-radius:20px;font-size:0.78rem;font-weight:600}
    /* ── Nav ── */
    nav{display:flex;background:#1e293b;border-bottom:1px solid #334155}
    nav button{flex:1;padding:11px 4px;background:none;border:none;color:#64748b;font-size:0.75rem;cursor:pointer}
    nav button.active{color:#f1f5f9;border-bottom:2px solid #3b82f6}
    /* ── Panels ── */
    .panel{display:none}
    .panel.active{display:block}
    /* ── Map ── */
    #gameMap{height:calc(100vh - 98px - 42px)}
    /* ── Radar bar ── */
    #radarBar{position:fixed;bottom:calc(42px + 12px);left:50%;transform:translateX(-50%);background:rgba(30,41,59,.95);border:1px solid #334155;border-radius:24px;padding:8px 20px;font-size:0.82rem;color:#94a3b8;z-index:200;display:none;white-space:nowrap;backdrop-filter:blur(8px)}
    #radarBar.near{color:#fbbf24;border-color:#d97706;background:rgba(69,26,3,.95)}
    #radarBar.very-near{color:#4ade80;border-color:#16a34a;background:rgba(5,46,22,.95);animation:pulse 1s infinite}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.7}}
    /* ── QR FAB supprimé — scan natif caméra Android/iOS ── */
    /* ── Compass panel ── */
    #panelCompass{height:calc(100vh - 98px - 42px);overflow-y:auto;padding:16px;max-width:520px;margin:0 auto}
    #compassStatus{text-align:center;font-size:0.78rem;color:#64748b;padding:10px 0 4px}
    #compassPermBtn{display:none;width:100%;padding:14px;background:linear-gradient(135deg,#3b82f6,#6366f1);border:none;border-radius:12px;color:#fff;font-size:1rem;font-weight:700;cursor:pointer;margin-bottom:14px}
    .cmp-card{background:#1e293b;border-radius:16px;padding:16px 14px;margin-bottom:12px;display:flex;align-items:center;gap:14px;border:2px solid #334155;transition:border-color .4s}
    .cmp-card.in-range{border-color:#22c55e;box-shadow:0 0 20px rgba(34,197,94,.25)}
    .cmp-arrow-wrap{width:80px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
    .cmp-arrow-wrap svg{transition:transform .35s ease}
    .cmp-info{flex:1;min-width:0}
    .cmp-label{font-weight:700;font-size:1rem;margin-bottom:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .cmp-dist{font-size:0.82rem;color:#64748b;margin-bottom:6px}
    .cmp-hint{font-size:0.74rem;color:#93c5fd;margin-bottom:8px}
    .cmp-capture{width:100%;padding:10px;background:linear-gradient(135deg,#22c55e,#16a34a);border:none;border-radius:10px;color:#fff;font-weight:700;cursor:pointer;font-size:0.9rem;box-shadow:0 2px 12px rgba(34,197,94,.4)}
    /* ── Capture FAB (balises fixes) ── */
    #captureFab{position:fixed;bottom:calc(42px + 14px);right:18px;padding:13px 20px;background:linear-gradient(135deg,#22c55e,#16a34a);border:none;border-radius:16px;font-size:1rem;font-weight:700;color:#fff;cursor:pointer;z-index:1000;box-shadow:0 4px 20px rgba(34,197,94,.5);display:none;animation:pulse 1.2s infinite}
    /* ── Progress bar ── */
    #progressBar{position:fixed;bottom:0;left:0;right:0;background:#1e293b;border-top:1px solid #334155;padding:6px 16px 8px;z-index:200;display:none}
    #progressBar .pb-label{display:flex;justify-content:space-between;font-size:0.72rem;color:#64748b;margin-bottom:5px}
    #progressBar .pb-label strong{color:#f1f5f9}
    #progressBar .pb-track{height:10px;background:#0f172a;border-radius:6px;overflow:hidden;border:1px solid #334155}
    #progressBar .pb-fill{height:100%;background:linear-gradient(90deg,#3b82f6,#6366f1);border-radius:6px;transition:width .5s ease;min-width:0}
    /* ── Leaderboard ── */
    #panelScores{height:calc(100vh - 98px);overflow-y:auto;padding:16px;max-width:600px;margin:0 auto}
    .lb-row{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;background:#1e293b;border-radius:10px;margin-bottom:8px;border:1px solid #334155}
    .lb-row.lb-me{border-color:#3b82f6;background:#1e3a5f}
    .lb-rank{font-size:1.1rem;font-weight:700;width:32px;text-align:center;color:#64748b;padding-top:2px;flex-shrink:0}
    .lb-rank.gold{color:#fbbf24}
    .lb-rank.silver{color:#94a3b8}
    .lb-rank.bronze{color:#c2855a}
    .lb-body{flex:1;min-width:0}
    .lb-name{font-weight:700;font-size:0.92rem;color:#f1f5f9;margin-bottom:3px}
    .lb-stats{font-size:0.78rem;color:#64748b;margin-bottom:4px}
    .lb-stats strong{color:#f1f5f9;font-size:0.88rem}
    .lb-unique{display:inline-block;background:#0f2942;border:1px solid #1d4ed8;border-radius:6px;color:#93c5fd;font-size:0.72rem;padding:2px 8px;margin:2px 4px 2px 0}
    .lb-reward{margin-top:6px;background:#14532d;border:1px solid #16a34a;border-radius:8px;color:#4ade80;font-size:0.78rem;padding:6px 10px;font-weight:600}
    .lb-refresh{font-size:0.72rem;color:#334155;text-align:center;padding:8px;margin-top:4px}
    /* ── QR Modal supprimé ── */
    /* ── Found modal ── */
    #foundModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.9);z-index:700;align-items:center;justify-content:center;padding:24px}
    #foundModal.open{display:flex}
    .found-box{background:#1e293b;border-radius:20px;padding:28px 24px;width:100%;max-width:400px;text-align:center}
    .found-emoji{font-size:3rem;margin-bottom:12px}
    .found-box h2{font-size:1.2rem;margin-bottom:8px}
    .found-box p{font-size:0.85rem;color:#94a3b8;margin-bottom:20px}
    .found-box .duration{font-size:1.6rem;font-weight:700;color:#4ade80;margin-bottom:8px}
    /* ── Pause screen ── */
    #pauseScreen{display:none;position:fixed;inset:0;background:rgba(15,23,42,.97);z-index:800;align-items:center;justify-content:center;text-align:center;flex-direction:column;gap:16px}
    #pauseScreen.open{display:flex}
  </style>
</head>
<body>

<!-- ── Background map (landing) ─────────────────────── -->
<div id="bgMap"></div>

<!-- ── Pseudo screen ────────────────────────────────── -->
<div id="pseudoScreen">
  <div class="ps-box">
    <div class="ps-logo">🏙</div>
    <div class="ps-title">Urban3DQuest</div>
    <p class="ps-sub">Chasse au trésor urbaine<br>Entre ton pseudo pour rejoindre</p>
    <input type="text" id="pseudoInput" placeholder="TON PSEUDO" maxlength="20" autocomplete="off" autocapitalize="characters">
    <div id="gameCodeWrap" style="display:none;margin-bottom:12px">
      <input type="text" id="gameCodeInput" placeholder="CODE D'ACCÈS" maxlength="20" autocomplete="off" autocapitalize="characters" style="border-color:#7c3aed;margin-bottom:0">
    </div>
    <p id="pseudoErr" style="color:#f87171;font-size:0.78rem;margin-bottom:10px;display:none"></p>
    <button class="btn-main" id="startBtn" onclick="startGame()">🚀 Rejoindre le jeu</button>
  </div>
</div>

<!-- ── Header ────────────────────────────────────────── -->
<header>
  <h1>🗺 Urban3DQuest</h1>
  <span class="pseudo-chip" id="headerPseudo"></span>
  <span class="score-chip" id="headerScore">0 🏆</span>
</header>
<nav>
  <button id="navMap" class="active" onclick="showTab('map',this)">🗺 Carte</button>
  <button id="navCompass" style="display:none" onclick="showTab('compass',this)">🧭 Boussole</button>
  <button id="navScores" onclick="showTab('scores',this)">🏆 Scores</button>
</nav>

<!-- ── Game Map ───────────────────────────────────────── -->
<div id="panelMap" class="panel active">
  <div id="gameMap"></div>
</div>

<!-- ── Boussole ──────────────────────────────────────── -->
<div id="panelCompass" class="panel">
  <button id="compassPermBtn" onclick="requestCompassPermission()">🧭 Activer le compas (iOS)</button>
  <div id="compassStatus">GPS en cours…</div>
  <div id="compassCards"></div>
  <div id="compassDebug" style="margin-top:16px;font-size:0.68rem;color:#94a3b8;line-height:1.6;padding:8px 12px;background:#1e293b;border-radius:8px;display:none"></div>
  <button onclick="toggleCompassDebug()" style="margin-top:8px;width:100%;padding:8px;background:transparent;border:1px solid #334155;border-radius:8px;color:#475569;font-size:0.7rem;cursor:pointer">🔧 Debug info</button>
</div>

<!-- ── Leaderboard ───────────────────────────────────── -->
<div id="panelScores" class="panel">
  <div id="lbList"><p style="color:#475569;text-align:center;padding:40px">Chargement…</p></div>
  <div class="lb-refresh" id="lbRefresh"></div>
</div>

<!-- ── Radar bar ─────────────────────────────────────── -->
<div id="radarBar"></div>

<!-- ── Capture FAB (balises fixes GPS) ──────────────── -->
<button id="captureFab" onclick="captureFixed()">📸 Capturer !</button>

<!-- ── Progress bar ──────────────────────────────────── -->
<div id="progressBar">
  <div class="pb-label">
    <span>🎯 Balises fixes trouvées</span>
    <strong id="pbCount">0 / 5</strong>
  </div>
  <div class="pb-track"><div class="pb-fill" id="pbFill" style="width:0%"></div></div>
</div>

<!-- ── Found modal ───────────────────────────────────── -->
<div id="foundModal">
  <div class="found-box">
    <img id="foundPhoto" style="width:100%;max-height:180px;object-fit:cover;border-radius:12px;margin-bottom:12px;display:none">
    <div id="foundPhotoStrip" style="display:none;margin-bottom:12px"></div>
    <div class="found-emoji" id="foundEmoji">🎉</div>
    <h2 id="foundTitle">Trésor trouvé !</h2>
    <div class="duration" id="foundDuration"></div>
    <p id="foundDesc"></p>
    <button class="btn-main" onclick="closeFound()">✅ Continuer</button>
  </div>
</div>

<!-- ── Pause screen ──────────────────────────────────── -->
<div id="pauseScreen">
  <div style="font-size:3rem">⏸</div>
  <h2>Jeu en pause</h2>
  <p style="color:#64748b;font-size:0.85rem">L'organisateur a mis le jeu en pause.<br>Patiente…</p>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<script>
const SUPABASE_URL = 'https://jocfvobqfpygixrawnbq.supabase.co';
const SUPABASE_KEY = 'sb_publishable_M8SxhXrmh17vrOf1WlOM6Q_ZNKNqQhM';

const { createClient } = supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);

let myPseudo     = localStorage.getItem('u3dq_pseudo') || '';
let myScore      = 0;
let myFoundCount = 0;
let gameMap      = null;
let treasures    = [];
let mapMarkers   = {};
let proximityR   = 100;
let fixedTotal   = 5;   // total fixed beacons, overridden by config key 'fixedTotal'
let modeMap      = true;  // show map tab
let modeCompass  = true;  // show compass tab
let activeTab    = 'map';
let deviceHeading = null; // degrees clockwise from north (from device sensor)
let compassInterval = null;
let mapCenter    = [48.8566, 2.3522]; // default Paris, overridden by config
let activeQuest  = '';   // empty = all quests visible
let gameStart    = null;  // Date or null — reference timestamp for score calc
let gameCode     = '';    // empty = open access
let playerLat    = null, playerLng = null;
let playerAccuracy = null; // GPS accuracy in meters
let gpsHistory   = []; // last N positions for smoothing
let scanner      = null; // unused, kept for compat
let nearestFixed = null; // fixed beacon currently in capture range
let lbInterval   = null;
let geoWatch     = null;
let lastHapticZone = null; // track last haptic zone to avoid repeat vibrations

// ── Device token for pseudo ownership ────────────────
function getDeviceToken() {
  let t = localStorage.getItem('u3dq_token');
  if (!t) { t = crypto.randomUUID(); localStorage.setItem('u3dq_token', t); }
  return t;
}

// ── Startup ──────────────────────────────────────────
let bgMap = null;

window.addEventListener('load', async () => {
  // Pre-fetch config to get mapCenter + gameCode for landing screen
  const { data: cfgData } = await db.from('config').select('key,value').in('key',['mapCenter','gameCode']);
  if (cfgData) {
    const cMap = Object.fromEntries(cfgData.map(r => [r.key, r.value]));
    if (cMap.mapCenter) {
      const parts = cMap.mapCenter.split(',').map(Number);
      if (parts.length === 2 && !isNaN(parts[0])) mapCenter = parts;
    }
    if (cMap.gameCode) {
      gameCode = cMap.gameCode;
      document.getElementById('gameCodeWrap').style.display = 'block';
    }
  }

  const params  = new URLSearchParams(location.search);
  const foundId = params.get('found');

  // Returning user: skip landing + bgMap entirely
  if (myPseudo) {
    document.getElementById('pseudoScreen').style.display = 'none';
    document.getElementById('bgMap').style.display = 'none';
    initGame(foundId);
    return;
  }

  // New user: show animated landing with bgMap
  if (foundId) sessionStorage.setItem('pendingFound', foundId);

  bgMap = L.map('bgMap', { zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, touchZoom: false, doubleClickZoom: false, keyboard: false });
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(bgMap);
  bgMap.setView(mapCenter, 14);
  if (navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(pos => {
      bgMap && bgMap.setView([pos.coords.latitude, pos.coords.longitude], 15);
    }, () => {}, { timeout: 5000 });
  }
});

function hideLanding() {
  document.getElementById('pseudoScreen').style.display = 'none';
  if (bgMap) { bgMap.remove(); bgMap = null; }
  document.getElementById('bgMap').style.display = 'none';
}

// ── Register & start ─────────────────────────────────
async function startGame() {
  const input = document.getElementById('pseudoInput');
  const err   = document.getElementById('pseudoErr');
  const pseudo = input.value.trim().toUpperCase().replace(/[^A-Z0-9_\-]/g, '');

  if (pseudo.length < 2) { err.textContent = 'Pseudo trop court (min 2 caractères)'; err.style.display = 'block'; return; }

  // Check game code if required
  if (gameCode) {
    const entered = (document.getElementById('gameCodeInput').value || '').trim().toUpperCase().replace(/[^A-Z0-9]/g,'');
    if (entered !== gameCode) { err.textContent = 'Code d\'accès incorrect.'; err.style.display = 'block'; return; }
  }
  err.style.display = 'none';

  document.getElementById('startBtn').disabled = true;
  document.getElementById('startBtn').textContent = '⏳ Connexion…';

  const myToken = getDeviceToken();

  // Check/insert player — select without token to avoid column-missing errors
  const { data: existing, error: selErr } = await db.from('players').select('pseudo,score,found_count').eq('pseudo', pseudo).single();
  if (!existing) {
    // New pseudo — try insert with token, fallback without
    let res = await db.from('players').insert({ pseudo, joined_at: new Date().toISOString(), score: 0, found_count: 0, token: myToken });
    if (res.error && (res.error.code === '42703' || (res.error.message && res.error.message.includes('token')))) {
      res = await db.from('players').insert({ pseudo, joined_at: new Date().toISOString(), score: 0, found_count: 0 });
    }
    if (res.error && res.error.code !== '23505') {
      err.textContent = 'Erreur réseau : ' + res.error.message;
      err.style.display = 'block';
      document.getElementById('startBtn').disabled = false;
      document.getElementById('startBtn').textContent = '🚀 Rejoindre le jeu';
      return;
    }
  } else {
    // Existing pseudo — try to check token ownership separately
    const { data: tokenRow } = await db.from('players').select('token').eq('pseudo', pseudo).single().catch(() => ({ data: null }));
    if (tokenRow && tokenRow.token && tokenRow.token !== myToken) {
      err.textContent = '🔒 Ce pseudo est déjà pris. Choisis un autre nom.';
      err.style.display = 'block';
      document.getElementById('startBtn').disabled = false;
      document.getElementById('startBtn').textContent = '🚀 Rejoindre le jeu';
      return;
    }
    if (tokenRow && !tokenRow.token) {
      db.from('players').update({ token: myToken }).eq('pseudo', pseudo).catch(() => {});
    }
    myScore      = existing.score      || 0;
    myFoundCount = existing.found_count || 0;
  }

  myPseudo = pseudo;
  localStorage.setItem('u3dq_pseudo', pseudo);
  hideLanding();

  const pending = sessionStorage.getItem('pendingFound');
  sessionStorage.removeItem('pendingFound');
  initGame(pending);
}

// ── Init game ────────────────────────────────────────
async function initGame(pendingFoundId) {
  updateHeader();
  document.getElementById('radarBar').style.display = 'block';

  // Load config
  const { data: cfg } = await db.from('config').select('*');
  if (cfg) {
    const c = Object.fromEntries(cfg.map(r => [r.key, r.value]));
    if (c.proximityRadius) proximityR = Number(c.proximityRadius);
    if (c.fixedTotal)      fixedTotal  = Number(c.fixedTotal);
    if (c.modeMap !== undefined)     modeMap     = c.modeMap !== 'false';
    if (c.modeCompass !== undefined) modeCompass = c.modeCompass !== 'false';
    if (c.gameActive === 'false') showPause();
    if (c.activeQuest !== undefined) activeQuest = c.activeQuest || '';
    if (c.mapCenter) {
      const parts = c.mapCenter.split(',').map(Number);
      if (parts.length === 2 && !isNaN(parts[0])) mapCenter = parts;
    }
    if (c.gameStart) {
      const gs = new Date(c.gameStart);
      if (!isNaN(gs.getTime())) gameStart = gs;
    }
  }

  // Load treasures & init map
  await loadTreasures();

  // Show / hide tabs based on config
  document.getElementById('navMap').style.display     = modeMap     ? '' : 'none';
  document.getElementById('navCompass').style.display = modeCompass ? '' : 'none';
  // If map is off but compass is on, start on compass
  if (!modeMap && modeCompass) {
    showTab('compass', document.getElementById('navCompass'));
  } else {
    initMap();
  }

  // Start orientation sensor (Android = no permission; iOS = button shown)
  startOrientationWatch();

  startGeoWatch();
  startLbPolling();
  updateProgressBar();

  // Clean URL & process pending QR
  if (pendingFoundId) {
    history.replaceState({}, '', location.pathname);
    await processFindById(pendingFoundId);
  }
}

function updateHeader() {
  document.getElementById('headerPseudo').textContent = myPseudo;
  document.getElementById('headerScore').textContent  = `${myFoundCount} 🏆`;
}

// ── Treasures ────────────────────────────────────────
async function loadTreasures() {
  let q = db.from('treasures').select('id,type,lat,lng,label,hint,visible,photo_url,found_by,placed_at').eq('visible', true);
  if (activeQuest) q = q.eq('quest', activeQuest);
  const { data } = await q;
  if (!data) return;
  treasures = data;
}

// ── Map ──────────────────────────────────────────────
function initMap() {
  gameMap = L.map('gameMap', { zoomControl: true }).setView(mapCenter, 15);
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '© OpenStreetMap' }).addTo(gameMap);
  renderMarkers();
  // Zoom to show all treasures on first load
  if (treasures.length) {
    const bounds = treasures.map(t => [t.lat, t.lng]);
    gameMap.fitBounds(bounds, { padding: [50, 50], maxZoom: 17 });
  }
}

function getPhotoUrls(raw){if(!raw)return[];if(raw.charAt(0)==='['){try{return JSON.parse(raw).filter(Boolean);}catch(e){}}return[raw];}

function renderMarkers() {
  Object.values(mapMarkers).forEach(m => gameMap.removeLayer(m));
  mapMarkers = {};

  treasures.forEach(t => {
    const isMine  = t.found_by && t.found_by.split(',').includes(myPseudo);
    // Fixed beacons are hidden on the map unless already found by this player
    if (t.type === 'fixed' && !isMine) return;
    const isTaken = t.type === 'unique' && t.found_by && t.found_by.length > 0;
    const color   = isMine ? '#4ade80' : isTaken ? '#475569' : (t.type === 'unique' ? '#c084fc' : '#60a5fa');
    const opacity = isTaken && !isMine ? 0.4 : 1;

    const icon = L.divIcon({
      html: `<div style="background:${color};width:16px;height:16px;border-radius:50%;border:2px solid #fff;box-shadow:0 2px 8px rgba(0,0,0,.5);opacity:${opacity}"></div>`,
      className: '', iconSize: [16, 16], iconAnchor: [8, 8]
    });

    const popup = isTaken && !isMine
      ? `<b>${t.label || '?'}</b><br>🔒 Déjà récupéré`
      : (() => { const ph = getPhotoUrls(t.photo_url).map(u => `<img src="${u}" style="width:100%;max-height:90px;object-fit:cover;border-radius:5px;margin-bottom:3px;display:block">`).join(''); return `<div style="min-width:150px">${ph}<b>${t.label || '?'}</b><br><span style="font-size:0.82em;color:#888">${t.type === 'fixed' ? '📌 Balise fixe' : '🎁 Balise unique'}</span>${t.hint ? `<br><span style="font-size:0.82em;color:#93c5fd">💡 ${t.hint}</span>` : ''}</div>`; })();

    mapMarkers[t.id] = L.marker([t.lat, t.lng], { icon }).addTo(gameMap).bindPopup(popup, { maxWidth: 220 });
  });
}
function startGeoWatch() {
  if (!navigator.geolocation) {
    document.getElementById('radarBar').textContent = '📍 GPS non disponible sur cet appareil';
    return;
  }
  let playerMarker = null;
  geoWatch = navigator.geolocation.watchPosition(pos => {
    // Smooth GPS: keep last 5 positions, weighted average
    gpsHistory.push({ lat: pos.coords.latitude, lng: pos.coords.longitude, acc: pos.coords.accuracy });
    if (gpsHistory.length > 5) gpsHistory.shift();
    const weights = [1, 2, 3, 4, 5].slice(gpsHistory.length > 5 ? 0 : 5 - gpsHistory.length);
    const totalW = weights.reduce((a,b) => a+b, 0);
    playerLat = gpsHistory.reduce((s, p, i) => s + p.lat * weights[i], 0) / totalW;
    playerLng = gpsHistory.reduce((s, p, i) => s + p.lng * weights[i], 0) / totalW;
    playerAccuracy = pos.coords.accuracy;

    if (gameMap) {
      if (!playerMarker) {
        const icon = L.divIcon({
          html: `<div style="background:#f59e0b;width:12px;height:12px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 4px rgba(245,158,11,.3)"></div>`,
          className: '', iconSize: [12, 12], iconAnchor: [6, 6]
        });
        const rLat = Math.round(playerLat * 10000) / 10000;
        const rLng = Math.round(playerLng * 10000) / 10000;
        playerMarker = L.marker([rLat, rLng], { icon, zIndexOffset: 1000 }).addTo(gameMap);
      } else {
        const rLat = Math.round(playerLat * 10000) / 10000;
        const rLng = Math.round(playerLng * 10000) / 10000;
        playerMarker.setLatLng([rLat, rLng]);
      }
    }

    updateRadar();
  }, err => {
    const msgs = { 1: 'Permission GPS refusée', 2: 'GPS indisponible', 3: 'Délai GPS dépassé' };
    const bar = document.getElementById('radarBar');
    bar.textContent = '📍 ' + (msgs[err.code] || 'Erreur GPS') + ' — active la localisation';
    bar.className = '';
  }, { enableHighAccuracy: true, maximumAge: 5000 });
}

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371000, toRad = x => x * Math.PI / 180;
  const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
  const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
}

function distLabel(d) {
  if (d < 10)   return 'moins de 10m';
  if (d < 50)   return 'moins de 50m';
  if (d < 100)  return 'moins de 100m';
  if (d < 200)  return 'moins de 200m';
  if (d < 500)  return 'moins de 500m';
  if (d < 1000) return 'moins de 1km';
  return 'environ ' + (d / 1000).toFixed(1) + 'km';
}

function haptic(pattern) {
  if (navigator.vibrate) navigator.vibrate(pattern);
}

function updateRadar() {
  if (playerLat === null) return;
  const bar = document.getElementById('radarBar');
  const fab = document.getElementById('captureFab');

  // GPS accuracy warning
  const accStr = playerAccuracy ? ` · GPS ±${Math.round(playerAccuracy)}m` : '';
  const gpsWeak = playerAccuracy && playerAccuracy > 40;

  const candidates = treasures.filter(t => {
    if (t.type === 'unique' && t.found_by && t.found_by.length > 0) return false; // already taken
    if (t.found_by && t.found_by.split(',').includes(myPseudo)) return false; // already found by me
    return true;
  });

  if (!candidates.length) {
    bar.textContent = '✅ Tous les trésors trouvés !';
    bar.className = '';
    fab.style.display = 'none';
    nearestFixed = null;
    lastHapticZone = null;
    return;
  }

  let nearest = null, minDist = Infinity;
  candidates.forEach(t => {
    const d = haversine(playerLat, playerLng, t.lat, t.lng);
    if (d < minDist) { minDist = d; nearest = t; }
  });

  const dist = Math.round(minDist);
  const label = distLabel(dist);
  const isFixed = nearest.type === 'fixed';

  if (dist > proximityR * 5) {
    bar.textContent = `🧭 ${isFixed ? '📌' : '🎁'} Le plus proche : ${label}${accStr}`;
    bar.className = gpsWeak ? 'near' : '';
    fab.style.display = 'none';
    nearestFixed = null;
    if (lastHapticZone !== 'far') { lastHapticZone = 'far'; }
  } else if (dist > proximityR) {
    bar.textContent = `🔥 Tu approches ! ${label}${accStr}`;
    bar.className = 'near';
    fab.style.display = 'none';
    nearestFixed = null;
    if (lastHapticZone !== 'near') { lastHapticZone = 'near'; haptic([80, 60, 80]); }
  } else {
    if (isFixed) {
      const canCapture = !gpsWeak || playerAccuracy < proximityR * 1.5;
      bar.textContent = `📌 Balise fixe à portée !${gpsWeak ? ' ⚠️ GPS faible' : ''}${accStr}`;
      bar.className = 'very-near';
      nearestFixed = canCapture ? nearest : null;
      fab.style.display = (activeTab === 'map' && canCapture) ? 'block' : 'none';
      if (lastHapticZone !== 'capture') { lastHapticZone = 'capture'; haptic([100, 50, 100, 50, 200]); }
    } else {
      bar.textContent = `⚡ Tu y es ! ${label} — ouvre ta caméra et scanne le QR !${accStr}`;
      bar.className = 'very-near';
      fab.style.display = 'none';
      nearestFixed = null;
      if (lastHapticZone !== 'capture') { lastHapticZone = 'capture'; haptic([100, 50, 100, 50, 200]); }
    }
  }
}

async function captureFixed() {
  if (!nearestFixed) return;
  const fab = document.getElementById('captureFab');
  fab.disabled = true;
  fab.textContent = '⏳…';
  haptic([50, 30, 50, 30, 300]); // capture attempt vibration
  await processFindById(nearestFixed.id);
  nearestFixed = null;
  lastHapticZone = null;
  fab.style.display = 'none';
  fab.disabled = false;
  fab.textContent = '📸 Capturer !';
}

// ── Compass orientation ───────────────────────────────
function bearingTo(lat1, lng1, lat2, lng2) {
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const lat1r = lat1 * Math.PI / 180, lat2r = lat2 * Math.PI / 180;
  const y = Math.sin(dLng) * Math.cos(lat2r);
  const x = Math.cos(lat1r) * Math.sin(lat2r) - Math.sin(lat1r) * Math.cos(lat2r) * Math.cos(dLng);
  return (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;
}

function startOrientationWatch() {
  // iOS 13+: needs explicit permission via button tap
  if (typeof DeviceOrientationEvent !== 'undefined' &&
      typeof DeviceOrientationEvent.requestPermission === 'function') {
    document.getElementById('compassPermBtn').style.display = 'block';
    return;
  }
  _attachOrientationListeners();
}

async function requestCompassPermission() {
  try {
    const res = await DeviceOrientationEvent.requestPermission();
    if (res === 'granted') {
      document.getElementById('compassPermBtn').style.display = 'none';
      _attachOrientationListeners();
    } else {
      document.getElementById('compassPermBtn').textContent = '⚠️ Compas refusé — flèches statiques';
    }
  } catch(e) {
    document.getElementById('compassPermBtn').textContent = '⚠️ Erreur compas';
  }
}

function _attachOrientationListeners() {
  let hasAbsolute = false;

  // Prefer deviceorientationabsolute (Android Chrome 67+) — true north
  window.addEventListener('deviceorientationabsolute', e => {
    if (e.alpha !== null && e.alpha !== undefined) {
      hasAbsolute = true;
      // alpha = rotation around Z axis, clockwise from north on Android
      // Need to negate for clockwise compass heading
      deviceHeading = (360 - e.alpha) % 360;
    }
  }, true);

  // Fallback: standard deviceorientation
  window.addEventListener('deviceorientation', e => {
    // iOS: webkitCompassHeading is directly clockwise from north
    if (typeof e.webkitCompassHeading === 'number' && e.webkitCompassHeading >= 0) {
      deviceHeading = e.webkitCompassHeading;
      return;
    }
    // Android fallback if absolute didn't fire
    if (!hasAbsolute && e.alpha !== null && e.alpha !== undefined) {
      deviceHeading = (360 - e.alpha) % 360;
    }
  }, true);
}


function updateProgressBar() {
  const bar = document.getElementById('progressBar');
  if (!myPseudo) return;
  bar.style.display = 'block';
  const myFixedFound = treasures.filter(t =>
    t.type === 'fixed' &&
    t.found_by && t.found_by.split(',').includes(myPseudo)
  ).length;
  const pct = fixedTotal > 0 ? Math.min(100, Math.round(myFixedFound / fixedTotal * 100)) : 0;
  document.getElementById('pbCount').textContent = myFixedFound + ' / ' + fixedTotal;
  document.getElementById('pbFill').style.width = pct + '%';
  // Color: green when complete
  document.getElementById('pbFill').style.background =
    myFixedFound >= fixedTotal
      ? 'linear-gradient(90deg,#22c55e,#4ade80)'

// ── Compass ───────────────────────────────────────────
function startCompassInterval() {
  if (compassInterval) return;
  updateCompass();
  compassInterval = setInterval(updateCompass, 700);
}
function stopCompassInterval() {
  if (compassInterval) { clearInterval(compassInterval); compassInterval = null; }
}

function updateCompass() {
  if (activeTab !== 'compass') return;
  const status = document.getElementById('compassStatus');
  const cards  = document.getElementById('compassCards');

  // GPS not yet acquired
  if (playerLat === null) {
    status.innerHTML = '📍 En attente du GPS… <span style="font-size:0.7rem;color:#334155">(autorise la localisation)</span>';
    cards.innerHTML = '';
    return;
  }

  // Treasures not yet loaded
  if (!treasures.length) {
    status.textContent = '⏳ Chargement des balises…';
    cards.innerHTML = '';
    return;
  }

  const allFixed = treasures.filter(t => t.type === 'fixed');
  const fixed = allFixed
    .filter(t => !(t.found_by && t.found_by.split(',').includes(myPseudo)))
    .map(t => ({ ...t, dist: haversine(playerLat, playerLng, t.lat, t.lng) }))
    .sort((a, b) => a.dist - b.dist)
    .slice(0, 3);

  const hasHeading = deviceHeading !== null;
  status.innerHTML = hasHeading
    ? `🧭 Boussole active <span style="font-size:0.7rem;color:#475569">(cap: ${Math.round(deviceHeading)}°)</span>`
    : '🧭 Direction Nord — <span style="font-size:0.7rem;color:#fb923c">compas inactif</span>';

  if (!fixed.length) {
    cards.innerHTML = !allFixed.length
      ? '<p style="text-align:center;color:#475569;padding:40px">Aucune balise fixe dans ce jeu.</p>'
      : '<p style="text-align:center;color:#4ade80;padding:40px;font-size:1.1rem">🏆 Toutes les balises fixes trouvées !</p>';
    return;
  }

  cards.innerHTML = '';
  fixed.forEach(t => {
    const dist     = Math.round(t.dist);
    const bearing  = bearingTo(playerLat, playerLng, t.lat, t.lng);
    const rotation = hasHeading ? (bearing - deviceHeading + 360) % 360 : bearing;
    const inRange  = dist <= proximityR;
    const arrowColor = inRange ? '#22c55e' : '#60a5fa';

    const card = document.createElement('div');
    card.className = 'cmp-card' + (inRange ? ' in-range' : '');
    card.innerHTML = `
      <div class="cmp-arrow-wrap">
        <svg style="transform:rotate(${rotation}deg);transition:transform .3s ease;display:block;flex-shrink:0"
             width="64" height="64" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
          <polygon points="32,4 44,52 32,42 20,52" fill="${arrowColor}" stroke="#0f172a" stroke-width="1.5"/>
          <circle cx="32" cy="32" r="7" fill="#0f172a" stroke="${arrowColor}" stroke-width="2.5"/>
        </svg>
      </div>
      <div class="cmp-info">
        <div class="cmp-label">${t.label || t.id}</div>
        <div class="cmp-dist">${distLabel(dist)}</div>
        ${t.hint ? `<div class="cmp-hint">💡 ${t.hint}</div>` : ''}
        ${inRange ? `<button class="cmp-capture" onclick="captureFixedById('${t.id.replace(/'/g,"\\'")}',this)">📸 Capturer !</button>` : ''}
      </div>`;
    cards.appendChild(card);
  });
}

// ── Process find ─────────────────────────────────────
async function processFindById(treasureId) {
  // Fetch treasure fresh from DB
  const { data: t, error } = await db.from('treasures').select('*').eq('id', treasureId).single();
  if (error || !t) { alert('Trésor introuvable.'); return; }
  if (!t.visible)   { alert('Ce trésor n\'est pas encore actif.'); return; }

  // Check if already found by me
  const foundList = (t.found_by || '').split(',').filter(Boolean);
  if (foundList.includes(myPseudo)) { showFoundResult('already', t); return; }

  // Unique: check if taken
  if (t.type === 'unique' && foundList.length > 0) { showFoundResult('taken', t); return; }

  // Calculate duration
  // Calculate duration from max(placed_at, gameStart) to now
  const refTime = gameStart && gameStart > new Date(t.placed_at) ? gameStart : new Date(t.placed_at);
  const durationSec = Math.max(0, Math.round((Date.now() - refTime.getTime()) / 1000));

  // Update treasure found_by
  const newFoundBy = t.type === 'unique' ? myPseudo : [...foundList, myPseudo].join(',');
  const updatePayload = { found_by: newFoundBy, found_at: new Date().toISOString() };
  await db.from('treasures').update(updatePayload).eq('id', t.id);

  // Log event
  await db.from('events').insert({ pseudo: myPseudo, treasure_id: t.id, treasure_type: t.type, duration_sec: durationSec });

  // Update player score
  myScore      += durationSec;
  myFoundCount += 1;
  await db.from('players').update({ score: myScore, found_count: myFoundCount }).eq('pseudo', myPseudo);

  // Refresh local treasures
  await loadTreasures();
  renderMarkers();
  updateHeader();
  updateRadar();
  updateProgressBar();

  // Haptic feedback
  if (navigator.vibrate) navigator.vibrate([80, 40, 160]);

  showFoundResult('success', t, durationSec);
}

function showFoundResult(status, t, durationSec) {
  const modal = document.getElementById('foundModal');
  const emoji = document.getElementById('foundEmoji');
  const title = document.getElementById('foundTitle');
  const dur   = document.getElementById('foundDuration');
  const desc  = document.getElementById('foundDesc');

  // Show photos if available and found
  const photoStrip = document.getElementById('foundPhotoStrip');
  const photoSingle = document.getElementById('foundPhoto');
  photoSingle.style.display = 'none';
  if (status === 'success') {
    const photos = getPhotoUrls(t.photo_url);
    if (photos.length) {
      photoStrip.innerHTML = photos.map(url => `<img src="${url}" style="width:100%;max-height:160px;object-fit:cover;border-radius:10px;margin-bottom:6px;display:block">`).join('');
      photoStrip.style.display = 'block';
    } else { photoStrip.style.display = 'none'; }
  } else { photoStrip.style.display = 'none'; }

  if (status === 'success') {
    if (t.type === 'fixed') {
      emoji.textContent = '✅';
      title.textContent = `"${t.label || 'Balise'}" capturée !`;
      dur.textContent   = '';
      // Compte combien de fixes il reste
      const remaining = treasures.filter(tr =>
        tr.type === 'fixed' &&
        !(tr.found_by && tr.found_by.split(',').includes(myPseudo)) &&
        tr.id !== t.id
      ).length;
      if (remaining > 0) {
        desc.textContent = `Bravo ! Il te reste ${remaining} balise${remaining > 1 ? 's' : ''} fixe${remaining > 1 ? 's' : ''} à trouver. Continue !`;
      } else {
        // All fixed found — fetch reward message from config
        desc.textContent = '🏆 Incroyable ! Tu as trouvé toutes les balises fixes !';
        db.from('config').select('key,value').then(({ data: cfgData }) => {
          if (!cfgData) return;
          const cfg = Object.fromEntries(cfgData.map(r => [r.key, r.value]));
          const msg = cfg['rewardMessage_' + (activeQuest || '')] || cfg['rewardMessage'] || '';
          if (msg) desc.innerHTML = `🏆 Tu as trouvé toutes les balises fixes !<br><br>📍 <strong>${msg}</strong>`;
        });
      }
    } else {
      emoji.textContent = '🎁';
      title.textContent = `"${t.label || 'Trésor'}" trouvé !`;
      dur.textContent   = formatDuration(durationSec);
      desc.textContent  = 'Bravo ! Tu es le premier à l\'avoir récupéré.';
    }
  } else if (status === 'already') {
    emoji.textContent = '🔄';
    title.textContent = 'Déjà trouvé !';
    dur.textContent   = '';
    desc.textContent  = 'Tu as déjà scanné ce trésor.';
  } else {
    emoji.textContent = '🔒';
    title.textContent = 'Trop tard !';
    dur.textContent   = '';
    desc.textContent  = 'Ce trésor unique a déjà été récupéré par quelqu\'un d\'autre.';
  }
  modal.classList.add('open');
}

function closeFound() { document.getElementById('foundModal').classList.remove('open'); }

function formatDuration(sec) {
  if (sec < 60)   return `${sec}s`;
  if (sec < 3600) return `${Math.floor(sec/60)}min ${sec%60}s`;
  return `${Math.floor(sec/3600)}h ${Math.floor((sec%3600)/60)}min`;
}

// ── Leaderboard ──────────────────────────────────────
async function loadLeaderboard() {
  // Fetch all events (fixed + unique) with timestamp
  const [evRes, cfgRes] = await Promise.all([
    db.from('events').select('pseudo,treasure_id,treasure_type,duration_sec,created_at').order('created_at', { ascending: true }),
    db.from('config').select('key,value')
  ]);
  const events = evRes.data || [];
  const cfg    = Object.fromEntries((cfgRes.data || []).map(r => [r.key, r.value]));
  const rewardMsg = cfg['rewardMessage_' + (activeQuest || '')] || cfg['rewardMessage'] || '';
  const totalFixed = parseInt(cfg.fixedTotal || fixedTotal || 0);

  // Group events by player
  const players = {};
  events.forEach(e => {
    if (!e.pseudo) return;
    if (!players[e.pseudo]) players[e.pseudo] = { fixedEvents: [], uniqueEvents: [] };
    if (e.treasure_type === 'fixed')  players[e.pseudo].fixedEvents.push(e);
    if (e.treasure_type === 'unique') players[e.pseudo].uniqueEvents.push(e);
  });

  // Build rows
  const rows = Object.entries(players).map(([pseudo, d]) => {
    const fixedCount = d.fixedEvents.length;
    // Global fixed time = last fixed found_at - first fixed found_at
    let fixedDuration = null;
    if (d.fixedEvents.length >= 2) {
      const times = d.fixedEvents.map(e => new Date(e.created_at).getTime()).sort((a,b) => a-b);
      fixedDuration = Math.round((times[times.length-1] - times[0]) / 1000);
    } else if (d.fixedEvents.length === 1) {
      fixedDuration = 0;
    }
    const allFixed = fixedCount >= totalFixed && totalFixed > 0;
    return { pseudo, fixedCount, fixedDuration, uniqueEvents: d.uniqueEvents, allFixed };
  });

  // Sort: most fixed desc, then shortest duration asc, then most uniques desc
  rows.sort((a, b) => {
    if (b.fixedCount !== a.fixedCount) return b.fixedCount - a.fixedCount;
    if (a.fixedDuration !== null && b.fixedDuration !== null) return a.fixedDuration - b.fixedDuration;
    if (a.fixedDuration !== null) return -1;
    if (b.fixedDuration !== null) return 1;
    return b.uniqueEvents.length - a.uniqueEvents.length;
  });

  const medals = ['🥇','🥈','🥉'];
  const ranks  = ['gold','silver','bronze'];

  const html = rows.length ? rows.map((p, i) => {
    const isMe = p.pseudo === myPseudo;
    const durationStr = p.fixedDuration !== null
      ? `⏱ ${formatDuration(p.fixedDuration)}`
      : '';
    const allDoneStr = p.allFixed && rewardMsg
      ? `<div class="lb-reward">📍 ${rewardMsg}</div>`
      : (p.allFixed ? '<div class="lb-reward">🏆 Tous les fixes trouvés !</div>' : '');
    const uniqueStr = p.uniqueEvents.length
      ? p.uniqueEvents.map(e => `<span class="lb-unique">🎁 ${e.treasure_id} — ${formatDuration(e.duration_sec || 0)}</span>`).join('')
      : '';
    return `<div class="lb-row${isMe ? ' lb-me' : ''}">
      <div class="lb-rank ${ranks[i]||''}">${medals[i]||(i+1)}</div>
      <div class="lb-body">
        <div class="lb-name">${p.pseudo}${isMe ? ' 👈' : ''}</div>
        <div class="lb-stats">
          <strong>${p.fixedCount}${totalFixed ? '/'+totalFixed : ''} fixes</strong>
          ${durationStr}
          ${p.uniqueEvents.length ? `· ${p.uniqueEvents.length} unique${p.uniqueEvents.length>1?'s':''}` : ''}
        </div>
        ${uniqueStr}
        ${allDoneStr}
      </div>
    </div>`;
  }).join('') : '<p style="color:#475569;text-align:center;padding:40px">Personne n\'a encore trouvé de trésor…</p>';

  document.getElementById('lbList').innerHTML = html;
  document.getElementById('lbRefresh').textContent = 'Mis à jour ' + new Date().toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit', second:'2-digit' });
}

function showTab(name, btn) {
  activeTab = name;
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById('panel' + name.charAt(0).toUpperCase() + name.slice(1)).classList.add('active');
  if (btn) btn.classList.add('active');
  if (name === 'map') {
    setTimeout(() => gameMap && gameMap.invalidateSize(), 60);
    stopCompassInterval();
    updateRadar(); // refresh captureFab visibility
  } else if (name === 'compass') {
    document.getElementById('captureFab').style.display = 'none'; // hide map FAB
    startCompassInterval();
  } else {
    stopCompassInterval();
    document.getElementById('captureFab').style.display = 'none';
  }
}

// ── Pause ────────────────────────────────────────────
function showPause() { document.getElementById('pauseScreen').classList.add('open'); }

// ── Periodic refresh (treasures + config) ────────────
setInterval(async () => {
  if (!myPseudo) return;
  const { data: cfg } = await db.from('config').select('*');
  if (cfg) {
    const c = Object.fromEntries(cfg.map(r => [r.key, r.value]));
    if (c.gameActive === 'false') showPause();
    else document.getElementById('pauseScreen').classList.remove('open');
    if (c.proximityRadius) proximityR = Number(c.proximityRadius);
  }
  await loadTreasures();
  renderMarkers();
  updateRadar();
  updateProgressBar();
}, 15000);
</script>
</body>
